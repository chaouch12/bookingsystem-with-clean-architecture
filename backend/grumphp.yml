grumphp:
    stop_on_failure: true
    ignore_unstaged_changes: false
    hide_circumvention_tip: true
    process_timeout: 60
    parallel:
        enabled: false
    fixer:
        enabled: true
        fix_by_default: false
    git_hook_variables:
        EXEC_GRUMPHP_COMMAND: 'docker compose -f ../infrastructure/docker-compose.yml -p booking-system exec -T -e GRUMPHP_GIT_WORKING_DIR=/var/www/project -e GRUMPHP_PROJECT_DIR=/var/www/project/backend -w /var/www/project/backend php php'
    tasks:
        git_commit_message:
            allow_empty_message: false
            enforce_capitalized_subject: true
            enforce_no_subject_punctuations: false
            enforce_no_subject_trailing_period: true
            enforce_single_lined_subject: true
            max_subject_width: 100
            matchers:
                Must contain JIRA issue number: /DEV{1,3}-\d+/

        phpcsfixer:
            allow_risky: true
            config: '.php-cs-fixer.dist.php'
            config_contains_finder: true
            verbose: true
            diff: true
            triggered_by: ['php']

        phpstan:
            configuration: phpstan.dist.neon
            use_grumphp_paths: true
            triggered_by: ['php']
