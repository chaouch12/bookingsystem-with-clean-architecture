services:
  nginx:
    image: nginx:1.27-alpine
    ports:
      - "${APP_PORT:-8080}:80"
    volumes:
      - ../backend:/var/www/backend:cached
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/conf.d/performance.conf:/etc/nginx/conf.d/performance.conf:ro
      - ./nginx/sites-enabled:/etc/nginx/sites-enabled:ro
    depends_on:
      php:
        condition: service_started
    networks:
      booking:
      localdev:
        ipv4_address: ${BOOKING_NGINX_LOCALDEV_IP:-192.168.250.210}
        aliases:
          - booking-system-nginx

  php:
    build:
      context: .
      dockerfile: php/Dockerfile
    volumes:
      - ../backend:/var/www/backend:cached
      - ..:/var/www/project:cached
      - ./php/conf/xdebug.ini:/etc/php/xdebug.ini:ro
      - ./php/conf/xdebug-cli.ini:/etc/php/xdebug-cli.ini:ro
      - ./shared/setup_xdebug.sh:/setup_xdebug.sh:ro
    environment:
      APP_ENV: dev
      XDEBUG_PORT: ${XDEBUG_PORT:-9030}
      DATABASE_URL: mysql://${MYSQL_USER:-booking}:${MYSQL_PASSWORD:-booking}@mysql:3306/${MYSQL_DATABASE:-booking_system}?serverVersion=8.4&charset=utf8mb4
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - booking

  mysql:
    image: mysql:8.4
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-booking_system}
      MYSQL_USER: ${MYSQL_USER:-booking}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-booking}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./mysql/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-root}"]
      interval: 5s
      timeout: 5s
      retries: 20
    networks:
      - booking

  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT:-6379}:6379"
    networks:
      - booking

  opensearch:
    container_name: booking-dev-opensearch
    image: opensearchproject/opensearch:2.19.1
    environment:
      discovery.type: single-node
      plugins.security.disabled: "true"
      OPENSEARCH_INITIAL_ADMIN_PASSWORD: ${OPENSEARCH_INITIAL_ADMIN_PASSWORD:-DevAdmin123!}
      OPENSEARCH_JAVA_OPTS: "-Xms512m -Xmx512m"
    ports:
      - "${OPENSEARCH_PORT:-9201}:9200"
      - "${OPENSEARCH_PERF_PORT:-9601}:9600"
    volumes:
      - opensearch_data:/usr/share/opensearch/data
    networks:
      - booking

  opensearch-dashboards:
    image: opensearchproject/opensearch-dashboards:2.19.1
    ports:
      - "${OPENSEARCH_DASHBOARDS_PORT:-5602}:5601"
    environment:
      OPENSEARCH_HOSTS: '["http://opensearch:9200"]'
      DISABLE_SECURITY_DASHBOARDS_PLUGIN: "true"
    depends_on:
      opensearch:
        condition: service_started
    networks:
      - booking

  mailpit:
    image: axllent/mailpit:latest
    ports:
      - "${MAILPIT_UI_PORT:-8025}:8025"
      - "${MAILPIT_SMTP_PORT:-1026}:1025"
    networks:
      - booking

volumes:
  mysql_data:
  opensearch_data:

networks:
  booking:
    driver: bridge
  localdev:
    external: true
    name: ${LOCALDEV_NETWORK:-dev_localdev}
