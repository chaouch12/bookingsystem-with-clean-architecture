services:
  nginx:
    image: nginx:1.27-alpine
    ports:
      - "${APP_PORT:-8080}:80"
    volumes:
      - ../backend:/var/www/backend:cached
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      php:
        condition: service_started
    networks:
      - booking

  php:
    build:
      context: ./php
      dockerfile: Dockerfile
    volumes:
      - ../backend:/var/www/backend:cached
    environment:
      APP_ENV: dev
      DATABASE_URL: mysql://${MYSQL_USER:-booking}:${MYSQL_PASSWORD:-booking}@mysql:3306/${MYSQL_DATABASE:-booking_system}?serverVersion=8.4&charset=utf8mb4
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - booking

  mysql:
    image: mysql:8.4
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-booking_system}
      MYSQL_USER: ${MYSQL_USER:-booking}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-booking}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./mysql/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-root}"]
      interval: 5s
      timeout: 5s
      retries: 20
    networks:
      - booking

  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT:-6379}:6379"
    networks:
      - booking

  mailpit:
    image: axllent/mailpit:latest
    ports:
      - "${MAILPIT_UI_PORT:-8025}:8025"
      - "${MAILPIT_SMTP_PORT:-1026}:1025"
    networks:
      - booking

volumes:
  mysql_data:

networks:
  booking:
    driver: bridge
